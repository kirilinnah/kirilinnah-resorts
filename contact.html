<body>
    <header>

                <li><a href="about.html">About</a></li>

            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-form">
            <h2>Get in Touch</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
        <section class="contact-info">
            <h2>Our Location</h2>
            <!-- You can replace the src below with your Google Maps embed URL -->
            <iframe src="https://via.placeholder.com/600x300?text=Map+Placeholder" width="100%" height="300" frameborder="0" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </section>
    </main>
